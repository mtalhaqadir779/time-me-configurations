server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/timeme_auth
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: your-256-bit-secret-key-here
  expiration: 86400000       # 24h in ms
  refresh-expiration: 604800000  # 7d in ms